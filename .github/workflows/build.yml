name: Build
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        image: 
          - "swift:6.1.0"
    name: Build
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
          submodules: recursive
      - name: Build
        run: |
          rm -fr .build
          echo "Removed build folder"
          swift build -c release --target RHVoiceSwift
